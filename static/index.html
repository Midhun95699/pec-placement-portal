<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PEC Placement Portal – Login</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Outfit',sans-serif;min-height:100vh;background:linear-gradient(135deg,#e8f0fe,#f0f6ff,#dce8ff);display:flex;align-items:center;justify-content:center;padding:20px;}
.card{background:#ffffff;border:1.5px solid #dce8ff;border-radius:24px;padding:40px;width:100%;max-width:440px;box-shadow:0 8px 32px rgba(26,86,219,0.12);}
.logo{text-align:center;margin-bottom:28px;}
.logo img{height:70px;margin-bottom:10px;}
.logo h1{color:#1e293b;font-size:24px;font-weight:700;}
.logo p{color:#64748b;font-size:13px;margin-top:4px;}
.tabs{display:flex;background:#f0f6ff;border-radius:12px;padding:4px;margin-bottom:24px;}
.tab{flex:1;text-align:center;padding:10px;border-radius:10px;cursor:pointer;font-weight:600;font-size:14px;color:#64748b;transition:.2s;}
.tab.active{background:linear-gradient(135deg,#1a56db,#1447c0);color:#fff;}
.form-group{margin-bottom:16px;}
.form-group label{display:block;color:#1e293b;font-size:13px;font-weight:600;margin-bottom:6px;}
.form-group input,.form-group select{width:100%;padding:12px 16px;background:#f8faff;border:1.5px solid #bfdbfe;border-radius:10px;color:#1e293b;font-size:14px;font-family:'Outfit',sans-serif;outline:none;transition:.2s;}
.form-group input:focus,.form-group select:focus{border-color:#1a56db;background:#eff6ff;}
.form-group input::placeholder{color:#94a3b8;}
.form-group select option{background:#ffffff;color:#1e293b;}
.row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#1a56db,#1447c0);border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;cursor:pointer;margin-top:8px;transition:.2s;font-family:'Outfit',sans-serif;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.msg{padding:12px 16px;border-radius:10px;font-size:13px;margin-bottom:16px;display:none;}
.msg.error{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;}
.msg.success{background:#f0fdf4;border:1px solid #bbf7d0;color:#16a34a;}
.link{text-align:center;margin-top:14px;}
.link span{color:#1a56db;font-size:13px;cursor:pointer;text-decoration:underline;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <img src="pec_logo.png" alt="PEC Logo" onerror="this.style.display='none'"/>
    <h1>PEC Placement Portal</h1>
    <p>Your placement preparation starts here</p>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('login',this)">Login</div>
    <div class="tab" onclick="switchTab('register',this)">Register</div>
  </div>
  <div id="msg" class="msg"></div>
  <div id="loginForm">
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="loginEmail" placeholder="Enter your college email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="loginPassword" placeholder="Enter your password"/>
    </div>
    <button class="btn" id="loginBtn" onclick="doLogin()">Login to Portal</button>
    <div class="link"><span onclick="alert('Contact admin to reset password.')">Forgot Password?</span></div>
  </div>
  <div id="registerForm" style="display:none">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" id="regName" placeholder="Enter your full name"/>
    </div>
    <div class="row">
      <div class="form-group">
        <label>Roll Number</label>
        <input type="text" id="regRoll" placeholder="e.g. 22IT001"/>
      </div>
      <div class="form-group">
        <label>Semester</label>
        <select id="regSem">
          <option value="5">5th Sem</option>
          <option value="6" selected>6th Sem</option>
          <option value="7">7th Sem</option>
          <option value="8">8th Sem</option>
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>Department</label>
      <select id="regDept">
        <option>IT</option><option>CSE</option><option>ECE</option>
        <option>EEE</option><option>MECH</option><option>CIVIL</option>
      </select>
    </div>
    <div class="form-group">
      <label>Email Address</label>
      <input type="email" id="regEmail" placeholder="Enter your college email"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="regPassword" placeholder="Create a password (min 6 chars)"/>
    </div>
    <button class="btn" id="registerBtn" onclick="doRegister()">Create Account</button>
  </div>
</div>
<script>
const API = '/api';
function switchTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
  document.getElementById('msg').style.display='none';
}
function showMsg(text,type){
  const el=document.getElementById('msg');
  el.textContent=text; el.className='msg '+type; el.style.display='block';
}
async function doLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value.trim();
  if(!email||!password){showMsg('Please fill all fields!','error');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Logging in...';
  try{
    const res=await fetch(API+'/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password})});
    const data=await res.json();
    if(data.success){
      localStorage.setItem('pt_token',data.token);
      localStorage.setItem('pt_student',JSON.stringify(data.student));
      showMsg('Login successful! Redirecting...','success');
      setTimeout(()=>window.location.href='dashboard.html',1000);
    }else{showMsg(data.message||'Login failed!','error');}
  }catch(e){showMsg('Cannot connect to server!','error');}
  btn.disabled=false;btn.textContent='Login to Portal';
}
async function doRegister(){
  const name=document.getElementById('regName').value.trim();
  const email=document.getElementById('regEmail').value.trim();
  const password=document.getElementById('regPassword').value.trim();
  const department=document.getElementById('regDept').value;
  const semester=document.getElementById('regSem').value;
  const roll_no=document.getElementById('regRoll').value.trim();
  if(!name||!email||!password){showMsg('Please fill all required fields!','error');return;}
  if(password.length<6){showMsg('Password must be at least 6 characters!','error');return;}
  const btn=document.getElementById('registerBtn');
  btn.disabled=true;btn.textContent='Creating account...';
  try{
    const res=await fetch(API+'/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name,email,password,department,semester:parseInt(semester),roll_no})});
    const data=await res.json();
    if(data.success){
      localStorage.setItem('pt_token',data.token);
      localStorage.setItem('pt_student',JSON.stringify(data.student));
      showMsg('Account created! Redirecting...','success');
      setTimeout(()=>window.location.href='dashboard.html',1000);
    }else{showMsg(data.message||'Registration failed!','error');}
  }catch(e){showMsg('Cannot connect to server!','error');}
  btn.disabled=false;btn.textContent='Create Account';
}
if(localStorage.getItem('pt_token'))window.location.href='dashboard.html';
document.addEventListener('keypress',e=>{
  if(e.key==='Enter'){
    if(document.getElementById('loginForm').style.display!=='none')doLogin();
    else doRegister();
  }
});
</script>
</body>
</html>
